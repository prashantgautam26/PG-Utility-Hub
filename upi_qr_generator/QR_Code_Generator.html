<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <!-- QRCode.js library via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-initials {
            width: 60px;
            height: 60px;
            background-color: #2c3e50;
            color: #fff;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        #qrcode {
            margin: 2rem auto;
            display: flex;
            justify-content: center;
            padding: 15px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #qrcode canvas, #qrcode img {
            max-width: 100%;
        }

        .hidden {
            display: none;
        }

        #download-btn {
            background-color: #10b981;
            margin-top: 1rem;
        }

        .footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f1f5f9;
            font-size: 0.95rem;
            color: #64748b;
        }

        .footer strong {
            color: #1e293b;
        }

        .note {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 1.5rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
<style>
    .home-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        background: #4361ee;
        color: white !important;
        padding: 10px 15px;
        border-radius: 8px;
        text-decoration: none;
        font-family: sans-serif;
        font-weight: bold;
        z-index: 1000;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .home-btn:hover {
        background: #3f37c9;
        transform: scale(1.05);
    }
</style>
<a href="../index.html" class="home-btn">?? Home</a>

<div class="container">
    <div class="logo-initials">
        <span style="color: #3498db;">P</span><span style="color: #2ecc71;">G</span>
    </div>

    <h1>QR Code Generator</h1>
    
    <div class="form-group">
        <label for="upi_id">UPI ID (e.g. 9876543210@upi)</label>
        <input type="text" id="upi_id" placeholder="Enter UPI ID" required>
    </div>

    <div class="form-group">
        <label for="amount">Amount (Optional)</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01">
    </div>

    <button onclick="generateQR()">Generate Payment QR</button>

    <div id="qrcode" class="hidden"></div>
    
    <button id="download-btn" class="hidden" onclick="downloadQR()">Download QR Image</button>

    <p class="note">Instantly scannable by Google Pay, PhonePe, Paytm, and all other UPI apps.</p>

    <div class="footer">
        Created by <strong>Prashant Gautam</strong>
    </div>
</div>

<script>
    let qrcodeInstance = null;

    function generateQR() {
        const upiId = document.getElementById('upi_id').value.trim();
        const amount = document.getElementById('amount').value.trim();
        const qrDiv = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('download-btn');

        if (!upiId) {
            alert('Please enter a valid UPI ID.');
            return;
        }

        // UPI URI format: upi://pay?pa=<vpa>&pn=<name>&am=<amount>&cu=INR
        // Using "Payment" as default name since apps require this parameter
        let upiUri = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=Payment&cu=INR`;
        
        if (amount && amount > 0) {
            upiUri += `&am=${encodeURIComponent(amount)}`;
        }

        // Clear previous QR
        qrDiv.innerHTML = '';
        qrDiv.classList.remove('hidden');

        // Generate new QR
        qrcodeInstance = new QRCode(qrDiv, {
            text: upiUri,
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Show download button
        downloadBtn.classList.remove('hidden');
        
        // Smooth scroll to QR code
        qrDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function downloadQR() {
        const qrContainer = document.getElementById('qrcode');
        const img = qrContainer.querySelector('img');
        const canvas = qrContainer.querySelector('canvas');
        
        let dataURL;
        if (img && img.src) {
            dataURL = img.src;
        } else if (canvas) {
            dataURL = canvas.toDataURL("image/png");
        }

        if (dataURL) {
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = `UPI-QR-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }
</script>

</body>
</html>
