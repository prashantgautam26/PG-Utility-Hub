<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <!-- QRCode.js library via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    

<div class="container">
    <div class="logo-initials">
        <span style="color: #3498db;">P</span><span style="color: #2ecc71;">G</span>
    </div>

    <h1>QR Code Generator</h1>
    
    <div class="form-group">
        <label for="upi_id">UPI ID (e.g. 9876543210@upi)</label>
        <input type="text" id="upi_id" placeholder="Enter UPI ID" required>
    </div>

    <div class="form-group">
        <label for="amount">Amount (Optional)</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01">
    </div>

    <button onclick="generateQR()">Generate Payment QR</button>

    <div id="qrcode" class="hidden"></div>
    
    <button id="download-btn" class="hidden" onclick="downloadQR()">Download QR Image</button>

    <p class="note">Instantly scannable by Google Pay, PhonePe, Paytm, and all other UPI apps.</p>

    <div class="footer">
        Created by <strong>Prashant Gautam</strong>
    </div>
</div>

<script>
    let qrcodeInstance = null;

    function generateQR() {
        const upiId = document.getElementById('upi_id').value.trim();
        const amount = document.getElementById('amount').value.trim();
        const qrDiv = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('download-btn');

        if (!upiId) {
            alert('Please enter a valid UPI ID.');
            return;
        }

        // UPI URI format: upi://pay?pa=<vpa>&pn=<name>&am=<amount>&cu=INR
        // Using "Payment" as default name since apps require this parameter
        let upiUri = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=Payment&cu=INR`;
        
        if (amount && amount > 0) {
            upiUri += `&am=${encodeURIComponent(amount)}`;
        }

        // Clear previous QR
        qrDiv.innerHTML = '';
        qrDiv.classList.remove('hidden');

        // Generate new QR
        qrcodeInstance = new QRCode(qrDiv, {
            text: upiUri,
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Show download button
        downloadBtn.classList.remove('hidden');
        
        // Smooth scroll to QR code
        qrDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function downloadQR() {
        const qrContainer = document.getElementById('qrcode');
        const img = qrContainer.querySelector('img');
        const canvas = qrContainer.querySelector('canvas');
        
        let dataURL;
        if (img && img.src) {
            dataURL = img.src;
        } else if (canvas) {
            dataURL = canvas.toDataURL("image/png");
        }

        if (dataURL) {
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = `UPI-QR-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }
</script>

</body>
</html>
