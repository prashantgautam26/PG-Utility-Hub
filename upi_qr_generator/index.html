<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI QR Code Generator</title>
    <!-- QRCode.js library via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .form-group {
            text-align: left;
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        #qrcode {
            margin: 2rem auto;
            display: flex;
            justify-content: center;
            padding: 10px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        #qrcode canvas, #qrcode img {
            max-width: 100%;
        }

        .hidden {
            display: none;
        }

        #download-btn {
            background-color: #10b981;
            margin-top: 0.5rem;
        }

        .note {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 1rem;
        }
    </style>

    <!-- Home Button Styling -->
    <style>
        .home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #4361ee;
            color: white !important;
            padding: 10px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 15px;
            font-weight: bold;
            z-index: 999999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 2px solid white;
        }
        .home-btn:hover {
            background: #3f37c9;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        @media (max-width: 600px) {
            .home-btn { top: 10px; left: 10px; padding: 8px 12px; font-size: 13px; }
        }
        @media print { .home-btn { display: none; } }
    </style>
</head>
<body>
    <a href="../index.html" class="home-btn">🏠 Home</a>


<div class="container">
    <h1>UPI QR Generator</h1>
    
    <div class="form-group">
        <label for="upi_id">UPI ID (e.g. name@bank)</label>
        <input type="text" id="upi_id" placeholder="e.g. 9876543210@upi" required>
    </div>

    <div class="form-group">
        <label for="payee_name">Payee Name</label>
        <input type="text" id="payee_name" placeholder="Full Name" required>
    </div>

    <div class="form-group">
        <label for="amount">Amount (Optional)</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01">
    </div>

    <button onclick="generateQR()">Generate QR Code</button>

    <div id="qrcode" class="hidden"></div>
    
    <button id="download-btn" class="hidden" onclick="downloadQR()">Download QR Code</button>

    <p class="note">Generated QR codes follow the standard UPI protocol and can be scanned by any UPI-enabled app.</p>
</div>

<script>
    let qrcodeInstance = null;

    function generateQR() {
        const upiId = document.getElementById('upi_id').value.trim();
        const payeeName = document.getElementById('payee_name').value.trim();
        const amount = document.getElementById('amount').value.trim();
        const qrDiv = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('download-btn');

        if (!upiId || !payeeName) {
            alert('Please enter both UPI ID and Payee Name.');
            return;
        }

        // Standard UPI URI format
        // upi://pay?pa=<vpa>&pn=<name>&am=<amount>&cu=INR
        let upiUri = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent(payeeName)}&cu=INR`;
        
        if (amount && amount > 0) {
            upiUri += `&am=${encodeURIComponent(amount)}`;
        }

        // Clear previous QR
        qrDiv.innerHTML = '';
        qrDiv.classList.remove('hidden');

        // Generate new QR
        qrcodeInstance = new QRCode(qrDiv, {
            text: upiUri,
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Show download button
        downloadBtn.classList.remove('hidden');
    }

    function downloadQR() {
        const qrContainer = document.getElementById('qrcode');
        const img = qrContainer.querySelector('img');
        const canvas = qrContainer.querySelector('canvas');
        
        let dataURL;
        if (img && img.src) {
            dataURL = img.src;
        } else if (canvas) {
            dataURL = canvas.toDataURL("image/png");
        }

        if (dataURL) {
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = `UPI-QR-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }
</script>

</body>
</html>
