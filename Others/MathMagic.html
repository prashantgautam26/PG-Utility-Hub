        position: fixed;
        top: 20px;
        left: 20px;
        background: #4361ee;
        color: white !important;
        padding: 10px 18px;
        border-radius: 30px;
        text-decoration: none;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 15px;
        font-weight: bold;
        z-index: 9999;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 2px solid white;
    }
    .home-btn:hover {
        background: #3f37c9;
        transform: scale(1.05);

<a href="../index.html" class="home-btn">🏠 Home</a>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Magic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    

    <div class="main-wrapper">

        <!-- ===== CORNER BOXES ===== -->
        <div class="task-box addition top-left">
            <h4>Addition (+)</h4>
            <input type="number" id="add-num1" placeholder="First number">
            <input type="number" id="add-num2" placeholder="Second number">
            <button id="add-btn">Calculate</button>
            <div class="result-area" id="add-result"></div>
        </div>

        <div class="task-box subtraction top-right">
            <h4>Subtraction (-)</h4>
            <input type="number" id="sub-num1" placeholder="First number">
            <input type="number" id="sub-num2" placeholder="Second number">
            <button id="sub-btn">Calculate</button>
            <div class="result-area" id="sub-result"></div>
        </div>

        <div class="task-box multiplication middle-left">
            <h4>Multiplication (x)</h4>
            <input type="number" id="mul-num1" placeholder="First number">
            <input type="number" id="mul-num2" placeholder="Second number">
            <button id="mul-btn">Calculate</button>
            <div class="result-area" id="mul-result"></div>
        </div>

        <div class="task-box division middle-right">
            <h4>Division (÷)</h4>
            <input type="number" id="div-num1" placeholder="Dividend">
            <input type="number" id="div-num2" placeholder="Divisor">
            <button id="div-btn">Calculate</button>
            <div class="result-area" id="div-result"></div>
        </div>


        <!-- ===== CENTRAL CALCULATOR ===== -->
        <div class="center-container">
            <div class="logo-container" style="text-align: center; margin-bottom: 10px;">
                <div class="logo-initials" style="width: 50px; height: 50px; background-color: #2c3e50; color: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; font-family: 'Segoe UI', sans-serif;">
                    <span style="color: #3498db;">P</span><span style="color: #2ecc71;">G</span>
                </div>
            </div>
            <h1 class="title">Math Magic</h1>
            <div class="calculator">
                <input type="number" id="centerNumberInput" placeholder="Enter a number...">
                <div class="center-buttons">
                    <button class="center-btn" data-op="square">Square</button>
                    <button class="center-btn" data-op="cube">Cube</button>
                    <button class="center-btn" data-op="sqrt">Square Root</button>
                    <button class="center-btn" data-op="cbrt">Cube Root</button>
                    <button class="center-btn center-btn-warning" data-op="table" style="grid-column: 1 / -1;">Multiplication Table</button>
                </div>
            </div>
            <div id="centerResultContainer">
                <h3>Result will appear here</h3>
            </div>
        </div>

    </div>

    <div class="signature">
        Created by <strong>Prashant Gautam</strong> | Assistant Accounts Officer | O/o Accountant General (A & E) Uttarakhand
    </div>

    <script>
        // --- Logic for Central Calculator ---
        const centerNumberInput = document.getElementById('centerNumberInput');
        const centerResultContainer = document.getElementById('centerResultContainer');
        const centerButtons = document.querySelectorAll('.center-btn');

        centerButtons.forEach(button => {
            button.addEventListener('click', () => {
                const operation = button.dataset.op;
                const num = parseFloat(centerNumberInput.value);

                if (isNaN(num)) {
                    centerResultContainer.innerHTML = '<h3>Error</h3><p>Please enter a valid number.</p>';
                    centerResultContainer.offsetHeight; // Force repaint
                    return;
                }
                let title = '';
                let contentHTML = '';
                switch (operation) {
                    case 'square':
                        title = `Square of ${num}`;
                        contentHTML = `<p class="lead">${num * num}</p>`;
                        break;
                    case 'cube':
                        title = `Cube of ${num}`;
                        contentHTML = `<p class="lead">${num * num * num}</p>`;
                        break;
                    case 'sqrt':
                        title = `Square Root of ${num}`;
                        contentHTML = `<p class="lead">${Math.sqrt(num)}</p>`;
                        break;
                    case 'cbrt':
                        title = `Cube Root of ${num}`;
                        contentHTML = `<p class="lead">${Math.cbrt(num)}</p>`;
                        break;
                    case 'table':
                        title = `Multiplication Table of ${num}`;
                        let items = '';
                        for (let i = 1; i <= 10; i++) {
                            items += `<div class="table-item">${num} x ${i} = ${num * i}</div>`;
                        }
                        contentHTML = `<div class="table-horizontal">${items}</div>`;
                        break;
                }
                centerResultContainer.innerHTML = `<h3>${title}</h3>${contentHTML}`;
                centerResultContainer.offsetHeight; // Force repaint
            });
        });

        // --- Logic for Corner Calculators ---
        function setupCornerCalc(op) {
            const btn = document.getElementById(`${op}-btn`);
            const num1Input = document.getElementById(`${op}-num1`);
            const num2Input = document.getElementById(`${op}-num2`);
            const resultArea = document.getElementById(`${op}-result`);

            const clearResult = () => {
                if (resultArea.innerText !== '') {
                    resultArea.innerText = '';
                    resultArea.offsetHeight; // Force repaint
                }
            };
            num1Input.addEventListener('input', clearResult);
            num2Input.addEventListener('input', clearResult);

            btn.addEventListener('click', () => {
                const num1 = parseFloat(num1Input.value);
                const num2 = parseFloat(num2Input.value);

                if (isNaN(num1) || isNaN(num2)) {
                    resultArea.innerText = 'Invalid numbers';
                    resultArea.offsetHeight; // Force repaint
                    return;
                }

                let resultText = '';
                switch (op) {
                    case 'add':
                        resultText = `Result: ${num1 + num2}`;
                        break;
                    case 'sub':
                        resultText = `Result: ${num1 - num2}`;
                        break;
                    case 'mul':
                        resultText = `Result: ${num1 * num2}`;
                        break;
                    case 'div':
                        if (num2 === 0) {
                            resultText = "Cannot divide by zero";
                        } else {
                            const quotient = Math.floor(num1 / num2);
                            const remainder = num1 % num2;
                            resultText = `Quotient: ${quotient}, Remainder: ${remainder}`;
                        }
                        break;
                }
                resultArea.innerText = resultText;
                resultArea.offsetHeight; // Force repaint
            });
        }
        
        setupCornerCalc('add');
        setupCornerCalc('sub');
        setupCornerCalc('mul');
        setupCornerCalc('div');

    </script>

</body>
</html>
