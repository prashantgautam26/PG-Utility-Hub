<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DA Arrear Calculator</title>
    

<div class="container">
    <div class="logo-container" style="text-align: center; margin-bottom: 10px;">
        <div class="logo-initials" style="width: 50px; height: 50px; background-color: #2c3e50; color: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; font-family: 'Segoe UI', sans-serif;">
            <span style="color: #3498db;">P</span><span style="color: #2ecc71;">G</span>
        </div>
    </div>
    <h1>DA Arrear Calculator</h1>
    <p style="text-align:center; margin-top:-15px; margin-bottom: 25px; font-size: 0.9em; color: #777;">Calculate retrospective DA increases.</p>

    <form id="arrearForm">
        <div class="form-grid">
            <div class="form-group">
                <label for="oldDARate">Old DA Rate (%)</label>
                <input type="number" id="oldDARate" placeholder="e.g., 50" required>
            </div>
            <div class="form-group">
                <label for="newDARate">New DA Rate (%)</label>
                <input type="number" id="newDARate" placeholder="e.g., 53" required>
            </div>
            <div class="form-group">
                <label for="arrearFrom">Arrear From</label>
                <input type="month" id="arrearFrom" required onchange="generateMonthInputs()">
            </div>
            <div class="form-group">
                <label for="arrearTo">Arrear To</label>
                <input type="month" id="arrearTo" required onchange="generateMonthInputs()">
            </div>
        </div>
        
        <div class="form-grid" id="monthlyBasicPays">
            <!-- Basic pay inputs will be generated here -->
        </div>

        <button type="button" onclick="calculateArrear()">Calculate Arrear</button>
    </form>
    <div id="results" style="display:none;">
        <h2>Arrear Calculation Result</h2>
        <div id="resultDetails"></div>
    </div>
</div>

<script>
    function updateSubsequentBasicPays(event) {
        const changedInput = event.target;
        const changedValue = changedInput.value;
        const changedIndex = parseInt(changedInput.id.split('-')[2]);

        const allMonthlyInputs = document.querySelectorAll('.monthly-basic');

        for (let i = changedIndex + 1; i < allMonthlyInputs.length; i++) {
            allMonthlyInputs[i].value = changedValue;
        }
    }

    function generateMonthInputs() {
        const fromDateStr = document.getElementById('arrearFrom').value;
        const toDateStr = document.getElementById('arrearTo').value;
        const container = document.getElementById('monthlyBasicPays');
        container.innerHTML = ''; // Clear previous inputs

        if (!fromDateStr || !toDateStr) return;

        let currentDate = new Date(fromDateStr + '-01T00:00:00');
        const toDate = new Date(toDateStr + '-01T00:00:00');

        if (currentDate > toDate) return;

        let i = 0;
        while (currentDate <= toDate) {
            const monthName = currentDate.toLocaleString('default', { month: 'long' });
            const year = currentDate.getFullYear();
            
            const formGroup = document.createElement('div');
            formGroup.className = 'form-group';

            const label = document.createElement('label');
            label.htmlFor = `basic-month-${i}`;
            label.textContent = `Basic Pay for ${monthName} ${year}`;
            
            const input = document.createElement('input');
            input.type = 'number';
            input.id = `basic-month-${i}`;
            input.className = 'monthly-basic';
            input.placeholder = `e.g., 64100`;
            input.required = true;
            input.oninput = updateSubsequentBasicPays; // Attach listener to every input

            formGroup.appendChild(label);
            formGroup.appendChild(input);
            container.appendChild(formGroup);

            currentDate.setMonth(currentDate.getMonth() + 1);
            i++;
        }
    }

    function calculateArrear() {
        const oldRate = parseFloat(document.getElementById('oldDARate').value);
        const newRate = parseFloat(document.getElementById('newDARate').value);
        const monthlyInputs = document.querySelectorAll('.monthly-basic');
        
        if (isNaN(oldRate) || isNaN(newRate) || monthlyInputs.length === 0) {
            alert('Please fill all fields and ensure date range is valid.');
            return;
        }

        const rateDifference = (newRate - oldRate) / 100;
        if (rateDifference <= 0) {
            alert('New DA Rate must be higher than the Old DA Rate.');
            return;
        }
        
        let totalArrear = 0;
        let resultHTML = '';

        for (const input of monthlyInputs) {
            const basicPay = parseFloat(input.value);
            if (isNaN(basicPay)) {
                alert('Please enter a valid basic pay for all months.');
                return;
            }
            const monthlyArrear = basicPay * rateDifference;
            totalArrear += monthlyArrear;
            const monthLabel = input.previousElementSibling.textContent.replace('Basic Pay for ', '');
            resultHTML += `<div class="result-item"><span>Arrear for ${monthLabel}:</span> <span class="value">${formatInr(monthlyArrear)}</span></div>`;
        }

        const npsDeduction = totalArrear * 0.10;
        const netPayment = totalArrear - npsDeduction;

        const resultsDiv = document.getElementById('results');
        const resultDetails = document.getElementById('resultDetails');
        
        resultDetails.innerHTML = resultHTML + 
            `<hr>` +
            `<div class="result-item"><strong><span>Gross Arrear Payable:</span></strong> <strong class="value">${formatInr(totalArrear)}</strong></div>` +
            `<div class="result-item"><span>Less: NPS Deduction (10%):</span> <span class="value">${formatInr(npsDeduction)}</span></div>` +
            `<hr>` +
            `<div class="result-item"><strong><span>Net Arrear Payable:</span></strong> <strong class="value">${formatInr(netPayment)}</strong></div>`;
        resultsDiv.style.display = 'block';
    }

    const formatInr = (num) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 2 }).format(num);

</script>

<p style="text-align:center; font-weight: bold; color: #e67e22; margin-top: 30px;">Created by:- Prashant Gautam, Assistant Accounts Officer, O/o Accountant General (A & E) Uttrakhand</p>
</body>
</html>
