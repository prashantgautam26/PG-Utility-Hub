<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="style.css">

    <!-- Home Button Styling -->
    <style>
        .home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #4361ee;
            color: white !important;
            padding: 10px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 15px;
            font-weight: bold;
            z-index: 999999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 2px solid white;
        }
        .home-btn:hover {
            background: #3f37c9;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        @media (max-width: 600px) {
            .home-btn { top: 10px; left: 10px; padding: 8px 12px; font-size: 13px; }
        }
        @media print { .home-btn { display: none; } }
    </style>
</head>
<body>
    <a href="../index.html" class="home-btn">🏠 Home</a>

    <div class="container">
        <h1>Typing Speed Test</h1>
        <div id="test-selection">
            <p>Select a test:</p>
            <!-- Sample test buttons will be added here by JavaScript -->
        </div>
        <div id="text-to-type-container">
            <p id="text-to-type"></p>
        </div>
        <textarea id="user-input" rows="10" placeholder="Start typing here..."></textarea>
        <div class="stats">
            <div class="stat">
                <p>Time</p>
                <p id="timer">0s</p>
            </div>
            <div class="stat">
                <p>WPM</p>
                <p id="wpm">0</p>
            </div>
            <div class="stat">
                <p>Accuracy</p>
                <p id="accuracy">100%</p>
            </div>
        </div>
        <button id="restart-btn">Restart</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
